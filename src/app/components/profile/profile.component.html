<div class="profile-container" *ngIf="user" [class.editing]="editing">
  <mat-card class="profile-card">
    <mat-card-header>
      <button mat-icon-button (click)="goBack()" class="back-btn">
        <mat-icon>arrow_back</mat-icon>
      </button>
      <mat-card-title>Your Profile</mat-card-title>
      <span class="spacer"></span>
      <button mat-icon-button *ngIf="!editing" (click)="startEdit()" matTooltip="Edit profile">
        <mat-icon>edit</mat-icon>
      </button>
    </mat-card-header>

    <mat-card-content>
      <!-- Avatar -->
      <div class="avatar-section">
        <div class="avatar" *ngIf="user.photoURL">
          <img [src]="user.photoURL" [alt]="user.displayName" />
        </div>
        <div class="avatar" *ngIf="!user.photoURL && user.character">
          <img [src]="user.character.imagePath" [alt]="user.character.name" [matTooltip]="user.character.name" />
        </div>
        <div class="avatar-info">
          <p class="email">{{ user.email }}</p>
          <p class="help-text" *ngIf="user.photoURL">Photo from Google account</p>
        </div>
      </div>

      <!-- View mode -->
      <ng-container *ngIf="!editing">
        <div class="profile-section">
          <h3>Name</h3>
          <p class="profile-value">{{ user.displayName }}</p>
        </div>
      </ng-container>

      <!-- Edit mode -->
      <ng-container *ngIf="editing">
        <h3 class="picker-title">Choose your player</h3>

        <div class="picker-filters">
          <mat-form-field appearance="outline" class="filter-field">
            <mat-label>Search by name</mat-label>
            <input matInput [(ngModel)]="filterName" (ngModelChange)="applyFilter()" />
          </mat-form-field>
          <mat-form-field appearance="outline" class="filter-field">
            <mat-label>Team</mat-label>
            <mat-select [(ngModel)]="filterTeam" (ngModelChange)="applyFilter()">
              <mat-option value="">All Teams</mat-option>
              <mat-option *ngFor="let t of teams" [value]="t">{{ t }}</mat-option>
            </mat-select>
          </mat-form-field>
          <mat-form-field appearance="outline" class="filter-field">
            <mat-label>Position</mat-label>
            <mat-select [(ngModel)]="filterPosition" (ngModelChange)="applyFilter()">
              <mat-option value="">All Positions</mat-option>
              <mat-option *ngFor="let p of positions" [value]="p">{{ p }}</mat-option>
            </mat-select>
          </mat-form-field>
        </div>

        <div class="player-grid">
          <div *ngFor="let player of filteredPlayers"
            class="player-card"
            [class.selected]="selectedPlayer?.name === player.name"
            (click)="selectPlayer(player)">
            <img [src]="player.imagePath" [alt]="player.name" class="player-img" />
            <span class="player-name">{{ player.name }}</span>
            <span class="player-meta">{{ player.position }} · {{ player.team }}</span>
          </div>
        </div>

        <mat-error *ngIf="error" class="error-msg">{{ error }}</mat-error>
        <div class="edit-actions">
          <button mat-raised-button color="primary" (click)="saveProfile()" [disabled]="!selectedPlayer">Save</button>
          <button mat-button (click)="cancelEdit()">Cancel</button>
        </div>
      </ng-container>
    </mat-card-content>
  </mat-card>
</div>

<div class="not-found" *ngIf="!user">
  <p>Please sign in to view your profile.</p>
  <button mat-raised-button color="primary" (click)="goBack()">Go Home</button>
</div>
