<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="#3f51b5"/>
  <!-- Subtle inner ring -->
  <circle cx="50" cy="50" r="36" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>

  <!-- W at 0° (top) -->
  <text x="50" y="17" text-anchor="middle" dominant-baseline="central"
    fill="white" font-size="15" font-weight="700" font-family="Roboto,Arial,sans-serif">W</text>

  <!-- ? at 60° -->
  <text x="78.6" y="33.5" text-anchor="middle" dominant-baseline="central"
    fill="#ffd740" font-size="15" font-weight="700" font-family="Roboto,Arial,sans-serif">?</text>

  <!-- W at 120° -->
  <text x="78.6" y="66.5" text-anchor="middle" dominant-baseline="central"
    fill="white" font-size="15" font-weight="700" font-family="Roboto,Arial,sans-serif">W</text>

  <!-- ? at 180° (bottom) -->
  <text x="50" y="83" text-anchor="middle" dominant-baseline="central"
    fill="#ffd740" font-size="15" font-weight="700" font-family="Roboto,Arial,sans-serif">?</text>

  <!-- W at 240° -->
  <text x="21.4" y="66.5" text-anchor="middle" dominant-baseline="central"
    fill="white" font-size="15" font-weight="700" font-family="Roboto,Arial,sans-serif">W</text>

  <!-- ? at 300° -->
  <text x="21.4" y="33.5" text-anchor="middle" dominant-baseline="central"
    fill="#ffd740" font-size="15" font-weight="700" font-family="Roboto,Arial,sans-serif">?</text>

  <!-- Center dot -->
  <circle cx="50" cy="50" r="3" fill="rgba(255,255,255,0.4)"/>
</svg>
